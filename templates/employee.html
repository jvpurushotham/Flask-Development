{% extends "base.html" %}

{% block content %}
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Salary</th>
        </tr>

        {% for emp in employees %}
        <tr>
            <td>{{ emp.name|upper }}</td>
            <td>{{ emp.salary }}</td>
        </tr>
        {% endfor %}
    </table>

{% endblock %}
